name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: web (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      # pnpm version is read from packageManager in package.json (pnpm@11.0.9).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          # pnpm 11 requires Node >= 22.13 (uses node:sqlite for its store).
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build

  contracts:
    name: contracts (forge test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - run: forge --version
      - run: forge build --sizes
      - run: forge test -vvv
